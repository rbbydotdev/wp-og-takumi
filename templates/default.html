<div tw="w-[1200px] h-[630px] flex items-center justify-center"
     style="background: linear-gradient(135deg, #C4653A, #1B6B6D)">
  <div tw="flex flex-col items-center text-white p-16 text-center">
    <span tw="text-lg uppercase tracking-widest opacity-70 mb-4">{{post_type_label}}</span>
    <h1 tw="text-6xl font-bold leading-tight max-w-[900px]">{{title}}</h1>
    <p tw="text-2xl mt-6 opacity-80 max-w-[700px]">{{excerpt}}</p>
    <div tw="flex items-center mt-8 gap-4">
      <span tw="text-lg font-semibold">{{site_name}}</span>
      <span tw="text-lg opacity-70">{{date}}</span>
    </div>
  </div>
</div>
