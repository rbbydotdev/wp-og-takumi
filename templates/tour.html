<div tw="w-[1200px] h-[630px] flex relative"
     style="background: linear-gradient(135deg, #1B6B6D, #0D4A4C)">
  <div tw="flex flex-col justify-between p-16 flex-1 text-white">
    <div tw="flex flex-col">
      <span tw="text-sm uppercase tracking-widest opacity-60 mb-2">Tour</span>
      <h1 tw="text-5xl font-bold leading-tight max-w-[700px]">{{title}}</h1>
      <p tw="text-xl mt-4 opacity-80 max-w-[600px]">{{excerpt}}</p>
    </div>
    <div tw="flex items-center gap-8 mt-auto">
      <div tw="flex flex-col">
        <span tw="text-sm opacity-60 uppercase">Price</span>
        <span tw="text-3xl font-bold">{{price}}</span>
      </div>
      <div tw="flex flex-col">
        <span tw="text-sm opacity-60 uppercase">Duration</span>
        <span tw="text-xl font-semibold">{{duration}}</span>
      </div>
      <div tw="flex flex-col">
        <span tw="text-sm opacity-60 uppercase">Location</span>
        <span tw="text-xl font-semibold">{{location}}</span>
      </div>
    </div>
    <div tw="flex items-center mt-6 gap-4">
      <span tw="text-lg font-semibold">{{site_name}}</span>
    </div>
  </div>
</div>
